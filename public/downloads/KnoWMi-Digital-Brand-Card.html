<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnoWMi - Digital Brand Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,900;1,9..144,900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #FF9933;
            --black: #05050A;
            --gray: rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: var(--black);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .card {
            width: 350px;
            background: linear-gradient(145deg, #0A0A14, #05050A);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,153,51,0.05) 0%, transparent 70%);
            z-index: 0;
        }
        .content { position: relative; z-index: 1; }
        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: -2px;
        }
        .logo span { color: var(--orange); }
        .tagline {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 40px;
        }
        .links {
            display: grid;
            grid-template-cols: 1fr;
            gap: 12px;
            margin-bottom: 32px;
        }
        .link-btn {
            background: var(--gray);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 14px;
            border-radius: 16px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .link-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--orange);
            transform: translateY(-2px);
        }
        .main-btn {
            background: var(--orange);
            color: white;
        }
        .footer-text {
            font-size: 9px;
            font-weight: 700;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="content">
            <div class="logo">KnoW<span>M</span>i</div>
            <div class="tagline">Scan Me. Know Me.</div>
            
            <div class="links">
                <a href="https://knowmi.in" class="link-btn main-btn">Official Website</a>
                <a href="https://knowmi.in/#pricing" class="link-btn">Shop Collection</a>
                <a href="https://knowmi.in/track" class="link-btn">Track Order</a>
                <a href="https://wa.me/917981325397" class="link-btn">WhatsApp Support</a>
            </div>
            
            <div class="footer-text">© 2025 KnoWMi Ecosystem</div>
        </div>
    </div>
</body>
</html>
